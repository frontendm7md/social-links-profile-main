<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="./assets/css/style.css"> 
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <title>Frontend Mentor | Social links profile</title>
</head>
<body>
  <main>
    <figure>
      <img src="./assets/images/avatar-jessica.jpeg" alt="Jessica Randall's profile picture">
      <blockquote>"Front-end developer and avid reader."</blockquote>
      <figcaption>
        <h1>Jessica Randall</h1>
        <p>London, United Kingdom</p>
      </figcaption>
    </figure>
    <nav>
      <ul>
        <li><a class="link" href="https://github.com" target="_blank" rel="noopener noreferrer" aria-label="GitHub (opens in a new tab)">GitHub</a></li>
        <li><a class="link" href="https://www.frontendmentor.io" target="_blank" rel="noopener noreferrer" aria-label="Frontend Mentor (opens in a new tab)">Frontend Mentor</a></li>
        <li><a class="link" href="https://www.linkedin.com" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn (opens in a new tab)">LinkedIn</a></li>
        <li><a class="link" href="https://twitter.com" target="_blank" rel="noopener noreferrer" aria-label="Twitter (opens in a new tab)">Twitter</a></li>
        <li><a class="link" href="https://instagram.com" target="_blank" rel="noopener noreferrer" aria-label="Instagram (opens in a new tab)">Instagram</a></li>
      </ul>
    </nav>
  </main>
  <footer>
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank" rel="noopener noreferrer" aria-label="Frontend Mentor (opens in a new tab)">Frontend Mentor</a>. 
    Coded by <a href="https://www.frontendmentor.io/profile/FrontendM7md" target="_blank" rel="noopener noreferrer" aria-label="FrontendM7md (opens in a new tab)">FrontendM7md</a>.
  </footer>
</body>
</html>
